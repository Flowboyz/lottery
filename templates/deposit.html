<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEPOSIT</title>
    <style>
        body{
            height: 100%;
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            justify-content: center;
            justify-items: center;
            border: 20px solid rgb(73, 161, 161);
            border-top: 0px;
         }

        h1{
            background-color: rgb(228, 228, 15);
            color: #222;
            font-weight: 20px;
            margin: 10px 20px 30px 10px;
            font-style: italic;
            border: 4px dotted rgb(73, 161, 161);
            border-radius: 5px;
            text-align: center;
            padding: 10px 10px 10px 10px;
         }

         span{
            font-style: italic;
            text-decoration: underline;
            color: rgb(228, 228, 15);
         }
         form{
            border: 2px solid rgb(234, 243, 243);
            padding: 20px 70px;
            border-radius: 5px;
            gap: 20px;
            background-color: darkslategray;
            width: 200px;
            box-shadow: 0px 0px 0px #fff;
            position: relative;
            text-align: center;
            margin-bottom: 60px;
         }

         label{
              color: rgb(185, 179, 179);  
        }

        input{
            border-radius: 5px;
        }
        h2{
            color: rgb(73, 161, 161);
        }

        #pick{
            color: rgb(250, 251, 250);
        }

        #deposit{
            margin-top: 20px;
            padding: 10px 20px 10px 20px;
            text-align: center;
            font-size: 20px;
            background-color: rgb(228, 228, 15);
        }    

    </style>
</head>
<body>
    <h1>DITTO-DINKY LOTTERY</h1>
    <h2>Fill in your Details and Click <span>deposit</span></h2>
    
    <form action="/deposit" method="post">

        <label for="name">Name: </label>
        <input type="text" id="name" name="name" required>

        <label for="amount">Amount: </label>
        <input type="number" name="amount" id="amount" min="10" required>

        <p id="pick">Are you over the age of 18?</p>
        <label>Yes</label>
        <input type="radio" name="age" value="yes" required>

        <label>No</label>
        <input type="radio" name="age" value="no" required>

        <p id="pick">Pick how you want to deposit</p>
        <select name="payment" id="payment" required>
            <option value="bank transfer">Bank transfer</option>
            <option value="bank card">Bank card</option>
            <option value="crypto">Crypto</option>
        </select> <br>

        <input type="submit" value="Deposit" id="deposit">
    </form>

</body>
</html>
