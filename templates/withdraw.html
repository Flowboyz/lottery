<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHDRAW</title>
    <style>
        body{
            height: 100%;
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            justify-content: center;
            justify-items: center;
            border: 20px solid rgb(73, 161, 161);
            border-top: 0px;
         }

        h1{
            background-color: rgb(228, 228, 15);
            color: #222;
            font-weight: 20px;
            margin: 10px 20px 30px 10px;
            font-style: italic;
            border: 4px dotted rgb(73, 161, 161);
            border-radius: 5px;
            text-align: center;
            padding: 10px 10px 10px 10px;
         }
        h2{
            color: rgb(73, 161, 161);
        }
        span{
            font-style: italic;
            text-decoration: underline;
            color: rgb(228, 228, 15);
         }
        form{
            border: 2px solid rgb(234, 243, 243);
            padding: 20px 70px;
            border-radius: 5px;
            gap: 20px;
            background-color: darkslategray;
            width: 200px;
            box-shadow: 0px 0px 0px #fff;
            position: relative;
            text-align: center;
            margin-bottom: 60px;
         }
         #withdraw{
            margin-top: 20px;
            padding: 10px 20px 10px 20px;
            text-align: center;
            font-size: 20px;
            background-color: rgb(228, 228, 15);
         }
    </style>
</head>
<body>
    <h1>DITTO-DINKY LOTTERY</h1>
    <h2>Withdraw <span>Funds</span></h2>

<form action="/withdraw" method="post">

    <label for="name">Name: </label>
    <input type="text" id="name" name="name" required>

    <label>Amount:</label>
    <input type="number" name="amount" min="10" required>

    <p>Withdraw Method</p>
    <select name="method">
        <option value="bank">Bank</option>
        <option value="crypto">Crypto</option>
        <option value="paypal">Paypal</option>
    </select>

    <br><br>
    <input type="submit" value="Withdraw" id="withdraw">
</form>
</body>
</html>
